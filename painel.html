<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sexta Feira Studies</title>

<link rel="stylesheet" href="css/style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
</head>

<body>

<!-- LOADING -->
<div id="loading-screen">

<div class="loading-logo">
📚
</div>

<h1>Sexta Feira Studies</h1>

<div class="loading-spinner"></div>

</div>

<!-- LOGIN -->
<section id="login-screen">

<div class="login-container">

<div class="logo-area">

<div class="logo-circle">
📚
</div>

<h1>Sexta Feira</h1>

<h2>Studies</h2>

<p>
Aprender nunca foi tão incrível.
</p>

</div>

<div class="auth-tabs">

<button
id="btnTabEntrar"
class="tab-btn active"
onclick="mostrarLogin()">
Entrar
</button>

<button
id="btnTabCadastro"
class="tab-btn"
onclick="mostrarCadastro()">
Criar Conta
</button>

</div>

<!-- LOGIN -->

<div id="loginForm">

<div class="input-group">

<span class="material-icons-round">
mail
</span>

<input
type="email"
id="loginEmail"
placeholder="Seu e-mail">

</div>

<div class="input-group">

<span class="material-icons-round">
lock
</span>

<input
type="password"
id="loginSenha"
placeholder="Sua senha">

</div>

<button
class="btn-primary"
onclick="loginEmail()">

<span class="material-icons-round">
login
</span>

Entrar

</button>

<button
class="btn-google"
onclick="loginGoogle()">

<img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg">

Continuar com Google

</button>

</div>

<!-- CADASTRO -->

<div
id="cadastroForm"
style="display:none">

<div class="input-group">

<span class="material-icons-round">
person
</span>

<input
type="text"
id="cadNome"
placeholder="Seu nome">

</div>

<div class="input-group">

<span class="material-icons-round">
mail
</span>

<input
type="email"
id="cadEmail"
placeholder="Seu e-mail">

</div>

<div class="input-group">

<span class="material-icons-round">
lock
</span>

<input
type="password"
id="cadSenha"
placeholder="Crie uma senha">

</div>

<button
class="btn-primary"
onclick="criarConta()">

<span class="material-icons-round">
person_add
</span>

Criar Conta

</button>

</div>

</div>

</section>

<!-- APP -->

<section
id="app-screen"
style="display:none">

<header class="topbar">

<div class="logo-mini">
📚 SF
</div>

<div class="top-actions">

<div class="xp-box">
⚡ <span id="xpUsuario">0</span>
</div>

<div class="streak-box">
🔥 <span id="streakUsuario">0</span>
</div>

<img
id="fotoPerfilTopo"
class="top-avatar"
src="">

</div>

</header>

<!-- CONTEÚDO -->

<main id="conteudo">

<!-- HOME -->

<section
id="homeTab"
class="tabPage active">

<h2>
Olá,
<span id="nomeUsuario">
Estudante
</span>
👋
</h2>

<div class="card progresso-card">

<h3>
Seu progresso
</h3>

<div class="barra">

<div
id="barraXP"
class="barra-fill">
</div>

</div>

</div>

<!-- AVISO GLOBAL -->

<div
id="avisoGlobal"
class="aviso-global"
style="display:none">

</div>

<!-- CRIAR POST -->

<div
class="criar-post"
onclick="abrirCriarPost()">

O que você aprendeu hoje?

</div>

<!-- FEED -->

<div id="feed">

</div>

</section>

<!-- MODULOS -->

<section
id="modulosTab"
class="tabPage">

<h2>Módulos</h2>

<div id="listaModulos">

</div>

</section>

<!-- FASES -->

<section
id="fasesTab"
class="tabPage">

<h2>Fases</h2>

<div id="listaFases">

</div>

</section>

<!-- RANKING -->

<section
id="rankingTab"
class="tabPage">

<h2>Ranking</h2>

<div id="rankingLista">

</div>

</section>

<!-- PERFIL -->

<section
id="perfilTab"
class="tabPage">

<div class="perfil-card">

<img
id="perfilFoto"
class="perfil-foto"
src="">

<h2 id="perfilNome">
Usuário
</h2>

<p id="perfilBio">
Estudante
</p>

<div class="perfil-stats">

<div>
<strong id="perfilXP">
0
</strong>

<span>XP</span>
</div>

<div>
<strong id="perfilNivel">
1
</strong>

<span>Nível</span>
</div>

<div>
<strong id="perfilPosts">
0
</strong>

<span>Posts</span>
</div>

</div>

<button
class="btn-primary"
onclick="logout()">

Sair

</button>

</div>

</section>

</main>

<!-- MENU INFERIOR -->

<nav class="bottom-nav">

<button
class="nav-btn active"
onclick="abrirTab('homeTab',this)">

<span class="material-icons-round">
home
</span>

</button>

<button
class="nav-btn"
onclick="abrirTab('modulosTab',this)">

<span class="material-icons-round">
menu_book
</span>

</button>

<button
class="nav-btn central-btn"
onclick="abrirCriarPost()">

<span class="material-icons-round">
add
</span>

</button>

<button
class="nav-btn"
onclick="abrirTab('rankingTab',this)">

<span class="material-icons-round">
emoji_events
</span>

</button>

<button
class="nav-btn"
onclick="abrirTab('perfilTab',this)">

<span class="material-icons-round">
person
</span>

</button>

</nav>

</section>

<script type="module" src="js/script.js"></script>

</body>
</html>
